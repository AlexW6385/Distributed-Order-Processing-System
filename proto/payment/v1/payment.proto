syntax = "proto3";

package payment.v1;

option go_package = "github.com/AlexW6385/Distributed-Order-Processing-System/gen/payment/v1;paymentv1";

service PaymentService {
  rpc PayOrder(PayOrderRequest) returns (PayOrderResponse);
}

message PayOrderRequest {
  string order_id = 1;
  int64 amount_cents = 2;
  string idempotency_key = 3;
}

message PayOrderResponse {
  string payment_id = 1;
  string order_id = 2;
  int64 amount_cents = 3;
  string status = 4;
}

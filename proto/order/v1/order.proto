syntax = "proto3";

package order.v1;

option go_package = "github.com/AlexW6385/Distributed-Order-Processing-System/gen/order/v1;orderv1";

service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (OrderResponse);
  rpc GetOrder(GetOrderRequest) returns (OrderResponse);
  rpc PayOrder(PayOrderRequest) returns (OrderResponse);
}

message OrderItemInput {
  string product_id = 1;
  int32 quantity = 2;
}

message OrderItem {
  string product_id = 1;
  string product_name = 2;
  int32 quantity = 3;
  int64 unit_price_cents = 4;
  int64 subtotal_cents = 5;
}

message Order {
  string id = 1;
  string customer_email = 2;
  string status = 3;
  int64 total_cents = 4;
  repeated OrderItem items = 5;
  string failure_reason = 6;
  string created_at = 7;
  string updated_at = 8;
}

message CreateOrderRequest {
  string customer_email = 1;
  repeated OrderItemInput items = 2;
}

message GetOrderRequest {
  string order_id = 1;
}

message PayOrderRequest {
  string order_id = 1;
  string idempotency_key = 2;
}

message OrderResponse {
  Order order = 1;
}

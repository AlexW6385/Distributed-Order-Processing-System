syntax = "proto3";

package product.v1;

option go_package = "github.com/AlexW6385/Distributed-Order-Processing-System/gen/product/v1;productv1";

service ProductService {
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse);
  rpc ReserveStock(ReserveStockRequest) returns (ReserveStockResponse);
  rpc ReleaseReservation(ReleaseReservationRequest) returns (ReleaseReservationResponse);
  rpc ConfirmReservation(ConfirmReservationRequest) returns (ConfirmReservationResponse);
}

message Product {
  string id = 1;
  string name = 2;
  string description = 3;
  int64 price_cents = 4;
  int32 stock = 5;
}

message ListProductsRequest {}

message ListProductsResponse {
  repeated Product products = 1;
}

message ReservationLine {
  string product_id = 1;
  int32 quantity = 2;
}

message ReservedItem {
  string product_id = 1;
  string product_name = 2;
  int32 quantity = 3;
  int64 unit_price_cents = 4;
  int64 subtotal_cents = 5;
}

message ReserveStockRequest {
  string order_id = 1;
  repeated ReservationLine items = 2;
}

message ReserveStockResponse {
  repeated ReservedItem items = 1;
  int64 total_cents = 2;
}

message ReleaseReservationRequest {
  string order_id = 1;
}

message ReleaseReservationResponse {}

message ConfirmReservationRequest {
  string order_id = 1;
}

message ConfirmReservationResponse {}

openapi: 3.0.3
info:
  title: Distributed Order Processing System API
  version: 1.0.0
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Gateway is running
  /products:
    get:
      summary: List available products
      responses:
        "200":
          description: Product list
  /orders:
    post:
      summary: Create an order and reserve stock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Order created
        "400":
          description: Invalid request
  /orders/{order_id}:
    get:
      summary: Get an order by id
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order found
        "404":
          description: Order not found
  /orders/{order_id}/pay:
    post:
      summary: Pay a reserved order
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayOrderRequest"
      responses:
        "200":
          description: Order paid
        "400":
          description: Invalid request
components:
  schemas:
    CreateOrderRequest:
      type: object
      required: [customer_email, items]
      properties:
        customer_email:
          type: string
          example: alex@example.com
        items:
          type: array
          items:
            type: object
            required: [product_id, quantity]
            properties:
              product_id:
                type: string
                example: prod-coffee-001
              quantity:
                type: integer
                minimum: 1
                example: 2
    PayOrderRequest:
      type: object
      properties:
        idempotency_key:
          type: string
          example: checkout-123
